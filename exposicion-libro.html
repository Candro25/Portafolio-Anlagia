<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uniendo Sedes A Través Del Paisaje Sonoro</title>
  <link rel="icon" type="image/png" href="LOGO_ANGLAIA.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <link rel="stylesheet" href="exposicion-libro.css">
</head>
<body>

  <div class="loading-screen" id="loadingScreen">
    <div class="loading-content">
      <div class="loading-logo">Uniendo Sedes A Través Del Paisaje Sonoro</div>
      <p class="loading-subtitle">Preparando catálogo interactivo</p>
    </div>
  </div>

  <header class="book-header">
    <a href="otros.html#exposiciones" class="book-back-btn" aria-label="Volver">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
      <span>Volver</span>
    </a>
    <div class="book-header-actions">
      <button class="book-action-btn" id="downloadBtn" title="Descargar PDF">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
      </button>
      <button class="book-action-btn" id="fullscreenBtn" title="Pantalla Completa">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
        </svg>
      </button>
    </div>
  </header>

  <main class="book-main">
    
    <button class="nav-zone nav-zone-left" id="prevBtn" title="Página Anterior">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    
    <button class="nav-zone nav-zone-right" id="nextBtn" title="Página Siguiente">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
    </button>

    <div class="book" id="book">
      
      <div class="book-page fixed-left" id="pageLeft">
        <canvas id="canvasLeft" class="book-canvas"></canvas>
        
        <div class="cover-editorial-layout" id="coverEditorial">
          <h1 id="editorialTitle">Uniendo Sedes A Través Del Paisaje Sonoro</h1>
          <h2 id="editorialSubtitle">Fotografía Documental</h2>
          <div class="editorial-line"></div>
          <p id="editorialDescription">Cargando presentación de la obra...</p>
          <div class="editorial-meta">
            <span id="editorialLocation">--</span>
            <span id="editorialYear">--</span>
          </div>
        </div>
      </div>

      <div class="book-page fixed-right" id="pageRight">
        <canvas id="canvasRight" class="book-canvas"></canvas>
      </div>

      <div class="flip-page" id="flipPage">
        <div class="flip-face flip-front">
          <canvas id="canvasFlipFront" class="book-canvas"></canvas>
        </div>
        <div class="flip-face flip-back">
          <canvas id="canvasFlipBack" class="book-canvas"></canvas>
        </div>
      </div>
    </div>
  </main>

  <footer class="book-footer">
    <div class="book-page-info">
      <span id="pageLabel">Portada</span>
    </div>
    <div class="book-page-dots" id="pageDots"></div>
  </footer>

  <script src="exposicion-libro.js"></script>
</body>
</html>
